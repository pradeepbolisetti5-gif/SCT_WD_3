<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Tic-Tac-Toe</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>Tic Tac Toe</h1>


      <div class="mode-selector">
            <button id="btn-pvp" class="mode-btn active" onclick="setMode('pvp')">Pass & Play</button>
            <button id="btn-pve" class="mode-btn" onclick="setMode('pve')">Vs Computer</button>
        </div>


      <div id="status" class="status-bar">Player <span class="turn-x">X</span>'s turn</div>


      <div class="scoreboard">
            <div class="score-card">
                <div class="score-label" id="label-x">Player X</div>
                <div id="score-x" class="score-value">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">Draws</div>
                <div id="score-draws" class="score-value">0</div>
            </div>
            <div class="score-card">
                <div class="score-label" id="label-o">Player O</div>
                <div id="score-o" class="score-value">0</div>
            </div>
        </div>

        <!-- Game Interaction Board Layout with Constant Size Blocks -->
        <div class="board-wrapper">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>


      <button class="btn-reset" onclick="resetBoard()">Reset Board</button>
    </div>


  <div id="result-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-title" class="modal-title">Match Over</div>
            <div id="modal-msg" class="modal-message">Player X won the match!</div>
            <button class="btn-popup" onclick="closeModal()">Play Again</button>
        </div>
    </div>


  <script src="script.js"></script>
</body>
</html>
